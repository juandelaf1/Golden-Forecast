<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 720" width="100%" height="100%">
  <!-- Transparent overlay for slot machine frame and ornamentation -->
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFDB70"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="softGlow"><feGaussianBlur stdDeviation="6" result="b"/></filter>
  </defs>

  <!-- Frame -->
  <g id="frame">
    <rect x="360" y="80" width="1200" height="560" rx="36" fill="none" stroke="url(#brass)" stroke-width="18" />
    <rect x="372" y="92" width="1176" height="536" rx="28" fill="none" stroke="#6b4a20" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Brass ornament plaque (title) -->
  <g id="plaque">
    <rect x="840" y="92" width="240" height="56" rx="8" fill="url(#brass)" stroke="#8B5A2B" stroke-width="1"/>
    <text x="960" y="130" font-family="Georgia, serif" font-size="20" fill="#3d250f" text-anchor="middle">ASSAY MACHINE</text>
  </g>

  <!-- Bulbs around frame (for GSAP flicker) -->
  <g id="bulbs">
    <!-- top bulbs -->
    <g fill="#FFF1D0" stroke="#B8860B" stroke-width="1">
      <!-- Left to right top -->
      <circle class="bulb" cx="420" cy="80" r="12"/>
      <circle class="bulb" cx="540" cy="72" r="10"/>
      <circle class="bulb" cx="660" cy="68" r="10"/>
      <circle class="bulb" cx="780" cy="66" r="10"/>
      <circle class="bulb" cx="900" cy="64" r="10"/>
      <circle class="bulb" cx="1020" cy="64" r="10"/>
      <circle class="bulb" cx="1140" cy="66" r="10"/>
      <circle class="bulb" cx="1260" cy="68" r="10"/>
      <circle class="bulb" cx="1380" cy="72" r="10"/>
      <circle class="bulb" cx="1500" cy="80" r="12"/>
    </g>
  </g>

  <!-- Reels placeholders (empty for widgets) -->
  <g id="reels">
    <rect x="540" y="220" width="220" height="280" rx="10" fill="rgba(0,0,0,0.0)" stroke="#6b4a20" stroke-width="2"/>
    <rect x="850" y="220" width="220" height="280" rx="10" fill="rgba(0,0,0,0.0)" stroke="#6b4a20" stroke-width="2"/>
    <rect x="1160" y="220" width="220" height="280" rx="10" fill="rgba(0,0,0,0.0)" stroke="#6b4a20" stroke-width="2"/>
  </g>

  <!-- Lever -->
  <g id="lever">
    <rect x="1530" y="360" width="18" height="140" rx="8" fill="#3d250f"/>
    <circle cx="1540" cy="340" r="18" fill="url(#brass)" stroke="#8B5A2B"/>
    <circle cx="1540" cy="310" r="12" fill="#FFD98A" opacity="0.9"/>
  </g>

  <!-- Engravings and flourishes (separate file recommended) -->
  <g id="engravings" opacity="0.95">
    <path d="M420 620 C540 560 1380 560 1500 620" stroke="#8B5A2B" stroke-width="1" fill="none" opacity="0.12"/>
  </g>

  <!-- Interaction zones (IDs for React/GSAP) -->
  <rect id="reel1" x="540" y="220" width="220" height="280" fill="transparent"/>
  <rect id="reel2" x="850" y="220" width="220" height="280" fill="transparent"/>
  <rect id="reel3" x="1160" y="220" width="220" height="280" fill="transparent"/>

</svg>
