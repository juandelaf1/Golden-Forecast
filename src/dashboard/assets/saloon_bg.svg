<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Gradientes y filtros -->
    <linearGradient id="bgWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C1608"/>
      <stop offset="35%" stop-color="#5A3315"/>
      <stop offset="65%" stop-color="#3D1F0D"/>
      <stop offset="100%" stop-color="#120700"/>
    </linearGradient>

    <linearGradient id="woodPanel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5A3315"/>
      <stop offset="25%" stop-color="#8B5A2B"/>
      <stop offset="55%" stop-color="#5A3315"/>
      <stop offset="85%" stop-color="#2C1608"/>
    </linearGradient>

    <linearGradient id="brassMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="30%" stop-color="#E5A000"/>
      <stop offset="60%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <linearGradient id="goldShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="40%" stop-color="#E5A000"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <linearGradient id="glassSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="floorWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A3315"/>
      <stop offset="40%" stop-color="#8B5A2B"/>
      <stop offset="100%" stop-color="#2C1608"/>
    </linearGradient>

    <radialGradient id="lampGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#E5A000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="lampGlowStrong" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#E5A000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </radialGradient>

    <filter id="bloom">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>

    <filter id="strongBloom">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- Símbolos reutilizables -->
    <symbol id="coin" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="url(#goldShine)" stroke="#8B5A2B" stroke-width="0.6"/>
      <circle cx="12" cy="12" r="6" fill="none" stroke="#5A3315" stroke-width="0.6" opacity="0.6"/>
    </symbol>

    <symbol id="goldBar" viewBox="0 0 40 20">
      <rect x="0" y="0" width="40" height="16" rx="3" fill="url(#brassMetal)" stroke="#8B5A2B" stroke-width="0.5"/>
      <rect x="3" y="2" width="34" height="12" rx="2" fill="url(#goldShine)"/>
    </symbol>

    <symbol id="dust" viewBox="0 0 4 4">
      <circle cx="2" cy="2" r="1.5" fill="#D4AF37" opacity="0.18"/>
    </symbol>

    <symbol id="spark" viewBox="0 0 6 6">
      <path d="M3 0 L4 2 L6 3 L4 4 L3 6 L2 4 L0 3 L2 2 Z" fill="#FFB300" opacity="0.28"/>
    </symbol>

    <style>
      /* Animaciones con rango limitado a 150-200px */
      @keyframes floatCoinSmall {
        0%{transform:translateY(0px) rotate(0deg);opacity:0}
        10%{opacity:0.6}
        80%{opacity:0.5}
        100%{transform:translateY(-160px) rotate(90deg);opacity:0}
      }
      @keyframes floatCoinSmall2 {
        0%{transform:translateY(0px) rotate(0deg);opacity:0}
        10%{opacity:0.5}
        80%{opacity:0.4}
        100%{transform:translateY(-120px) rotate(-60deg);opacity:0}
      }
      @keyframes opacityPulse{0%,100%{opacity:0.9}50%{opacity:0.75}}
      .coinFloat1{animation:floatCoinSmall 20s ease-in-out infinite}
      .coinFloat2{animation:floatCoinSmall2 24s ease-in-out infinite}
      .lampFlicker{animation:opacityPulse 3s ease-in-out infinite}
    </style>
  </defs>

  <!-- BACKGROUND -->
  <g id="background">
    <rect width="1920" height="1080" fill="url(#bgWall)"/>
    <rect x="0" y="180" width="1920" height="420" fill="url(#woodPanel)" opacity="0.95"/>
  </g>

  <!-- CENTER VIGNETTE (keeps 65% clean) -->
  <g id="vignette">
    <radialGradient id="centerVig" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.02"/>
      <stop offset="45%" stop-color="#8B5A2B" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#120700" stop-opacity="0.6"/>
    </radialGradient>
    <rect x="0" y="0" width="1920" height="1080" fill="url(#centerVig)"/>
  </g>

  <!-- TOP MOLDING / CEILING HINT -->
  <g id="wall_details">
    <rect x="60" y="40" width="1800" height="80" rx="6" fill="#3D1F0D"/>
    <path d="M80 60 h1760" stroke="#D4AF37" stroke-width="2" opacity="0.16"/>
  </g>

  <!-- LEFT: COUNTER (assay) -->
  <g id="counter">
    <rect x="80" y="550" width="520" height="220" rx="14" fill="url(#floorWood)"/>
    <rect x="80" y="520" width="520" height="100" rx="10" fill="url(#woodPanel)"/>
    <rect x="88" y="510" width="504" height="8" rx="4" fill="url(#brassMetal)" stroke="#8B5A2B" stroke-width="0.8"/>

    <!-- precision scale -->
    <g transform="translate(200,470) scale(0.9)">
      <rect x="-10" y="20" width="80" height="6" rx="3" fill="#5A3315"/>
      <circle cx="30" cy="24" r="4" fill="url(#brassMetal)" stroke="#8B5A2B" stroke-width="0.6"/>
      <line x1="30" y1="24" x2="30" y2="-20" stroke="url(#brassMetal)" stroke-width="3"/>
      <ellipse cx="-10" cy="-6" rx="16" ry="6" fill="#D4AF37" opacity="0.95"/>
      <ellipse cx="70" cy="-6" rx="16" ry="6" fill="#D4AF37" opacity="0.95"/>
    </g>

    <!-- ledger book and magnifier -->
    <g transform="translate(320,520)">
      <rect x="0" y="0" width="120" height="70" rx="6" fill="#F6E9D6" stroke="#C9B088" stroke-width="0.8"/>
      <rect x="6" y="6" width="108" height="18" fill="#EDE0C8"/>
      <rect x="6" y="30" width="108" height="28" fill="#F5EBD9"/>
      <rect x="120" y="62" width="36" height="4" rx="2" fill="#8B5A2B" transform="rotate(18 120 62)"/>
    </g>

    <g transform="translate(240,560)">
      <circle cx="12" cy="12" r="12" fill="#FFFFFF" opacity="0.03" stroke="#C9B088" stroke-width="1"/>
      <rect x="22" y="20" width="28" height="6" rx="3" fill="url(#brassMetal)"/>
    </g>

    <!-- display case -->
    <g transform="translate(120,420)">
      <rect x="0" y="0" width="360" height="160" rx="6" fill="#0F0704"/>
      <rect x="12" y="12" width="336" height="56" rx="3" fill="url(#glassSheen)" opacity="0.38"/>
      <use href="#goldBar" x="40" y="28" width="160" height="64"/>
      <use href="#goldBar" x="120" y="46" width="120" height="48"/>
      <use href="#goldBar" x="200" y="34" width="88" height="36"/>
    </g>
  </g>

  <!-- RIGHT: VAULT + CERTIFICATES -->
  <g id="vault">
    <g transform="translate(1430,440)">
      <rect x="0" y="0" width="360" height="320" rx="8" fill="#1A1A1A" stroke="#2C1608" stroke-width="1.2"/>
      <circle cx="180" cy="160" r="70" fill="#2C2C2C" stroke="#5A3315" stroke-width="6"/>
      <circle cx="180" cy="160" r="44" fill="url(#brassMetal)" stroke="#8B5A2B" stroke-width="1"/>
      <rect x="150" y="148" width="60" height="6" rx="3" fill="#120700"/>
    </g>

    <g transform="translate(1300,320)">
      <rect x="0" y="0" width="120" height="84" rx="6" fill="#F3E8D6" stroke="#D4AF37" stroke-width="3"/>
      <rect x="140" y="0" width="120" height="84" rx="6" fill="#F3E8D6" stroke="#D4AF37" stroke-width="3"/>
    </g>

    <g transform="translate(1560,260)">
      <rect x="0" y="0" width="40" height="90" rx="6" fill="#3D1F0D"/>
      <circle cx="20" cy="30" r="18" fill="#8B5A2B"/>
      <rect x="14" y="64" width="12" height="20" fill="#D4AF37"/>
    </g>
  </g>

  <!-- FLOOR -->
  <g id="floor">
    <rect x="0" y="760" width="1920" height="320" fill="url(#floorWood)"/>
    <g stroke="#2C1608" stroke-opacity="0.08" stroke-width="1">
      <line x1="80" y1="800" x2="1840" y2="800"/>
      <line x1="80" y1="840" x2="1840" y2="840"/>
      <line x1="80" y1="880" x2="1840" y2="880"/>
    </g>
    <ellipse cx="340" cy="840" rx="220" ry="46" fill="#000" opacity="0.25"/>
    <ellipse cx="1590" cy="880" rx="160" ry="36" fill="#000" opacity="0.28"/>
  </g>

  <!-- LIGHTS -->
  <g id="lights">
    <g transform="translate(480,420)">
      <rect x="0" y="0" width="36" height="80" rx="6" fill="url(#brassMetal)"/>
      <ellipse cx="18" cy="-8" rx="48" ry="28" fill="#FFF8E6" opacity="0.06" filter="url(#bloom)"/>
      <circle cx="18" cy="6" r="34" fill="url(#lampGlow)" class="lampFlicker"/>
    </g>
    <g transform="translate(1420,420)">
      <rect x="0" y="0" width="36" height="80" rx="6" fill="url(#brassMetal)"/>
      <ellipse cx="18" cy="-8" rx="48" ry="28" fill="#FFF8E6" opacity="0.06" filter="url(#bloom)"/>
      <circle cx="18" cy="6" r="34" fill="url(#lampGlow)" class="lampFlicker"/>
    </g>
  </g>

  <!-- COINS (confined to edges) -->
  <g id="coins">
    <use href="#coin" x="200" y="620" width="22" height="22" class="coinFloat1"/>
    <use href="#coin" x="240" y="580" width="18" height="18" class="coinFloat2"/>
    <use href="#coin" x="180" y="660" width="16" height="16" class="coinFloat1"/>

    <use href="#coin" x="1600" y="630" width="20" height="20" class="coinFloat2"/>
    <use href="#coin" x="1640" y="590" width="18" height="18" class="coinFloat1"/>
    <use href="#coin" x="1550" y="660" width="16" height="16" class="coinFloat2"/>
  </g>

  <!-- FOREGROUND overlay frame -->
  <g id="foreground_overlay">
    <rect x="24" y="24" width="1872" height="1032" rx="6" fill="none" stroke="#5A3315" stroke-width="2" opacity="0.6"/>
    <rect x="34" y="34" width="1852" height="992" rx="4" fill="none" stroke="#D4AF37" stroke-width="0.4" opacity="0.18"/>
  </g>

</svg>
