name: Pipeline diario — extracción, procesado y predicción

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GOLDEN_TOKEN }}
          fetch-depth: 1

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Paso 1 — Descargar datos nuevos
        run: python src/extract/extract.py

      - name: Paso 2 — Preprocesar datos
        run: python src/preprocessing.py

      - name: Paso 3 — Feature engineering
        run: python src/feature_engineering.py

      - name: Paso 4 — Generar predicción del día siguiente
        run: python src/predict.py

      - name: Guardar resultados en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/gold-clean.csv
          git add data/processed/gold-features.csv
          git add data/processed/predictions.csv
          git diff --staged --quiet || git commit -m "chore: actualización diaria $(date -u +'%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GOLDEN_TOKEN }}@github.com/${{ github.repository }} HEAD