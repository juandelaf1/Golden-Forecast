name: Fix — añadir GitHub Actions al bypass list del ruleset
on:
  workflow_dispatch:

jobs:
  fix-ruleset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GOLDEN_TOKEN }}

      - name: Añadir GitHub Actions al bypass list del ruleset
        env:
          GH_TOKEN: ${{ secrets.GOLDEN_TOKEN }}
        run: |
          RULESETS=$(gh api repos/juandelaf1/Golden-Forecast/rulesets 2>&1)
          RULESET_ID=$(echo "$RULESETS" | jq -r '.[0].id')

          if [ "$RULESET_ID" = "null" ] || [ -z "$RULESET_ID" ]; then
            echo "No se encontró ruleset existente. Creando uno nuevo..."
            gh api --method POST repos/juandelaf1/Golden-Forecast/rulesets \
              --input - << 'EOF'
            {
              "name": "Proteger main",
              "target": "branch",
              "enforcement": "active",
              "conditions": {
                "ref_name": {
                  "include": ["refs/heads/main"],
                  "exclude": []
                }
              },
              "rules": [
                {
                  "type": "required_linear_history"
                }
              ],
              "bypass_actors": [
                {
                  "actor_id": 4,
                  "actor_type": "Integration"
                }
              ]
            }
            EOF
          else
            echo "Ruleset encontrado ID: $RULESET_ID"
            CURRENT=$(gh api repos/juandelaf1/Golden-Forecast/rulesets/$RULESET_ID)
            HAS_BYPASS=$(echo "$CURRENT" | jq '.bypass_actors | any(.actor_id == 4 and .actor_type == "Integration")')

            if [ "$HAS_BYPASS" = "true" ]; then
              echo "GitHub Actions ya está en la bypass list. No se requieren cambios."
            else
              echo "Añadiendo GitHub Actions a la bypass list..."
              UPDATED=$(echo "$CURRENT" | jq '.bypass_actors += [{"actor_id": 4, "actor_type": "Integration"}]')
              echo "$UPDATED" | gh api --method PUT repos/juandelaf1/Golden-Forecast/rulesets/$RULESET_ID --input -
              echo "✅ GitHub Actions añadido al bypass list"
            fi
          fi

      - name: Verificar configuración
        env:
          GH_TOKEN: ${{ secrets.GOLDEN_TOKEN }}
        run: |
          RULESETS=$(gh api repos/juandelaf1/Golden-Forecast/rulesets)
          RULESET_ID=$(echo "$RULESETS" | jq -r '.[0].id')
          RESULT=$(gh api repos/juandelaf1/Golden-Forecast/rulesets/$RULESET_ID)
          echo "Ruleset: $(echo "$RESULT" | jq -r '.name')"
          echo "Bypass actors: $(echo "$RESULT" | jq -c '.bypass_actors')"
          echo "✅ Listo. El daily_pipeline.yml ya puede pushear a main sin restricciones."
